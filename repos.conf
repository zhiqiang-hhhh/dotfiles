# repos.conf - List of repositories to clone into ~/code/
#
# Format:
#   <repo_url>                        # clones into ~/code/<repo_name>
#   <repo_url> <custom_dir_name>      # clones into ~/code/<custom_dir_name>
#
# Lines starting with # are comments, empty lines are ignored.
#
# Examples:
# git@github.com:zhiqiang-hhhh/dotfiles.git
# git@github.com:zhiqiang-hhhh/my-project.git
# git@github.com:zhiqiang-hhhh/another-repo.git  custom-name
#
# Add your repos below:
git@github.com:zhiqiang-hhhh/doris.git
